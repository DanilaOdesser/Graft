# Render Blueprint — connect this repo at render.com/blueprints, set
# DATABASE_URL and optional ANTHROPIC_API_KEY in the dashboard, deploy.
services:
  - type: web
    name: graft-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
